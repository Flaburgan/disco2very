name: Build

on:
  push:

jobs:
  build-webapp:
    name: Build the web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Upload the build as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: disco2very-web-app
          path: ./out
          retention-days: 7

  test-e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: build-webapp
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
      - run: npm ci
      - name: Download the web app built by the previous job
        uses: actions/download-artifact@v4
        with:
          name: disco2very-web-app
          path: ./out
      - name: Install the Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Upload the test report as Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  build-click:
    name: Build Click Package
    runs-on: ubuntu-latest
    container:
      image: clickable/ci-20.04-amd64
    needs: build-webapp
    steps:
      - uses: actions/checkout@v4
      - name: Download disco2very-web-app from previous job
        uses: actions/download-artifact@v4
        with:
          name: disco2very-web-app
          path: ./out
      - name: Build with Clickable
        run: cd packaging/ubuntu-touch && clickable build

      - name: Upload Click Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: click-package
          path: packaging/ubuntu-touch/build/all/app/*.click
          retention-days: 7
